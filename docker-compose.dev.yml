services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: python:3.14-slim
    depends_on:
      redis:
        # condition: service_healthy
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - PREN_PROXY_REDIS_URL=redis://redis:6379
      - PREN_PROXY_DATA_PATH=data
    working_dir: /app
    volumes:
      - .:/app
      - backend-venv:/app/.venv
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        set -ex
        pip install uv -q
        uv sync --frozen
        uv run uvicorn prompt_engineering_proxy.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - frontend-modules:/app/frontend/node_modules
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        set -ex
        cd frontend
        npm install
        npm run build -- --watch

volumes:
  redis-data:
  backend-venv:
  frontend-modules:
