services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Production profile — run the full app in Docker
  app:
    build: .
    profiles: ["prod"]
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/app/data/proxy.db
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  app-data:
